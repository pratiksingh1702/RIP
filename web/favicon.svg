<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" fill="#0a0a0f"/>
  <circle cx="64" cy="64" r="8" fill="#00d4ff" filter="url(#glow)"/>
  <text x="64" y="90" font-family="JetBrains Mono, monospace" font-size="40" font-weight="900" fill="#00d4ff" text-anchor="middle" filter="url(#glow)">&lt;RIP&gt;</text>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
