version: "3.8"

services:
  gateway:
    build: .
    ports:
      - "8001:8001"
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8001
      - GATEWAY_POSTGRES_URL=postgresql+asyncpg://repo_intel:repo_intel@host.docker.internal:5433/repo_intel?ssl=disable
      - GATEWAY_REDIS_URL=redis://host.docker.internal:6379
    volumes:
      - ./gateway:/app/gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"

