services:
  neo4j:
    image: neo4j:5-community
    container_name: rip-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: rip-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    container_name: rip-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: repo_intel
      POSTGRES_USER: repo_intel
      POSTGRES_PASSWORD: repo_intel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repo_intel -d repo_intel"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    container_name: rip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  postgres_data:
  redis_data:
