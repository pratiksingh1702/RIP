name: rip_app
description: Repository Intelligence Platform — Mobile Client

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  
  # Navigation
  go_router: ^14.0.0
  app_links: ^6.3.2
  url_launcher: ^6.3.0
  
  # HTTP
  dio: ^5.4.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # Local storage
  shared_preferences: ^2.2.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.0
  path: ^1.9.0
  
  # UI
  flutter_markdown: ^0.7.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  google_fonts: ^6.1.0
  
  # Utilities
  uuid: ^4.3.0
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  
  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.20.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
